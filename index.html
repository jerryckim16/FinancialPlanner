<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Financial Planner</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      line-height: 1.5;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: 16px 24px;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
    }

    .container {
      max-width: 720px;
      margin: 32px auto;
      padding: 0 16px;
    }

    .card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
    }

    .card h2 {
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #86868b;
      margin-bottom: 16px;
    }

    .field-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    .field-group.full {
      grid-template-columns: 1fr;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #86868b;
      margin-bottom: 4px;
    }

    input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #d2d2d7;
      border-radius: 8px;
      font-size: 15px;
      font-family: "SF Mono", "Fira Code", monospace;
      background: #fafafa;
      transition: border-color 0.15s;
    }

    input:focus {
      outline: none;
      border-color: #0071e3;
      box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.15);
    }

    .results {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .stat-card {
      background: #f5f5f7;
      border-radius: 10px;
      padding: 16px;
    }

    .stat-card.highlight {
      background: #0071e3;
      color: #fff;
    }

    .stat-label {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      opacity: 0.7;
      margin-bottom: 4px;
    }

    .stat-value {
      font-size: 22px;
      font-weight: 700;
      font-family: "SF Mono", "Fira Code", monospace;
    }

    .stat-sub {
      font-size: 11px;
      opacity: 0.6;
      margin-top: 2px;
    }

    .bar-chart {
      margin-top: 8px;
    }

    .bar-row {
      display: flex;
      align-items: center;
      margin-bottom: 6px;
      font-size: 12px;
    }

    .bar-label {
      width: 50px;
      text-align: right;
      padding-right: 10px;
      color: #86868b;
      font-family: "SF Mono", "Fira Code", monospace;
      flex-shrink: 0;
    }

    .bar-track {
      flex: 1;
      height: 24px;
      background: #f0f0f0;
      border-radius: 4px;
      overflow: hidden;
      display: flex;
    }

    .bar-principal {
      background: #0071e3;
      height: 100%;
      transition: width 0.3s;
    }

    .bar-interest {
      background: #34c759;
      height: 100%;
      transition: width 0.3s;
    }

    .bar-amount {
      width: 90px;
      text-align: right;
      padding-left: 10px;
      font-family: "SF Mono", "Fira Code", monospace;
      color: #1d1d1f;
      flex-shrink: 0;
    }

    .legend {
      display: flex;
      gap: 16px;
      margin-bottom: 12px;
      font-size: 12px;
      color: #86868b;
    }

    .legend span::before {
      content: "";
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 2px;
      margin-right: 6px;
      vertical-align: middle;
    }

    .legend .leg-principal::before { background: #0071e3; }
    .legend .leg-interest::before { background: #34c759; }

    @media (max-width: 500px) {
      .field-group { grid-template-columns: 1fr; }
      .results { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Financial Planner</h1>
  </header>

  <div class="container">
    <!-- Inputs -->
    <div class="card">
      <h2>Compound Interest Calculator</h2>
      <div class="field-group">
        <div>
          <label for="principal">Initial Investment ($)</label>
          <input type="number" id="principal" value="10000" min="0" step="100" />
        </div>
        <div>
          <label for="monthly">Monthly Contribution ($)</label>
          <input type="number" id="monthly" value="500" min="0" step="50" />
        </div>
      </div>
      <div class="field-group">
        <div>
          <label for="rate">Annual Return Rate (%)</label>
          <input type="number" id="rate" value="7" min="-50" max="100" step="0.5" />
        </div>
        <div>
          <label for="years">Investment Period (years)</label>
          <input type="number" id="years" value="30" min="1" max="80" step="1" />
        </div>
      </div>
    </div>

    <!-- Summary -->
    <div class="card">
      <h2>Results</h2>
      <div class="results">
        <div class="stat-card highlight">
          <div class="stat-label">Total Value</div>
          <div class="stat-value" id="totalValue">--</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Total Interest Earned</div>
          <div class="stat-value" id="totalInterest">--</div>
          <div class="stat-sub" id="interestPct"></div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Total Contributions</div>
          <div class="stat-value" id="totalContrib">--</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Effective Monthly Growth</div>
          <div class="stat-value" id="monthlyGrowth">--</div>
        </div>
      </div>
    </div>

    <!-- Year-by-year chart -->
    <div class="card">
      <h2>Growth Over Time</h2>
      <div class="legend">
        <span class="leg-principal">Contributions</span>
        <span class="leg-interest">Interest</span>
      </div>
      <div class="bar-chart" id="barChart"></div>
    </div>
  </div>

  <script>
    function formatUSD(n) {
      return "$" + Math.round(n).toLocaleString("en-US");
    }

    function calculate() {
      var principal = parseFloat(document.getElementById("principal").value) || 0;
      var monthly = parseFloat(document.getElementById("monthly").value) || 0;
      var annualRate = parseFloat(document.getElementById("rate").value) || 0;
      var years = parseInt(document.getElementById("years").value) || 1;

      var monthlyRate = annualRate / 100 / 12;
      var months = years * 12;

      // Build year-by-year data
      var data = [];
      var balance = principal;
      var totalContributed = principal;

      for (var y = 1; y <= years; y++) {
        for (var m = 0; m < 12; m++) {
          balance = balance * (1 + monthlyRate) + monthly;
          totalContributed += monthly;
        }
        data.push({
          year: y,
          balance: balance,
          contributed: totalContributed,
          interest: balance - totalContributed
        });
      }

      var last = data[data.length - 1];
      var totalValue = last.balance;
      var totalInterest = last.interest;
      var totalContrib = last.contributed;

      // Update summary
      document.getElementById("totalValue").textContent = formatUSD(totalValue);
      document.getElementById("totalInterest").textContent = formatUSD(totalInterest);
      document.getElementById("totalContrib").textContent = formatUSD(totalContrib);
      document.getElementById("interestPct").textContent =
        totalContrib > 0
          ? Math.round((totalInterest / totalContrib) * 100) + "% return on contributions"
          : "";

      // Effective monthly growth
      if (months > 0 && principal > 0) {
        var effectiveMonthly = (Math.pow(totalValue / principal, 1 / months) - 1) * 100;
        document.getElementById("monthlyGrowth").textContent = effectiveMonthly.toFixed(3) + "%";
      } else {
        document.getElementById("monthlyGrowth").textContent = "--";
      }

      // Render bar chart — show every year if <= 15, otherwise sample
      var maxVal = totalValue;
      var chart = document.getElementById("barChart");
      chart.innerHTML = "";

      var step = 1;
      if (years > 30) step = 5;
      else if (years > 15) step = 2;

      for (var i = 0; i < data.length; i++) {
        if ((i + 1) % step !== 0 && i !== data.length - 1) continue;

        var d = data[i];
        var pctContrib = maxVal > 0 ? (d.contributed / maxVal) * 100 : 0;
        var pctInterest = maxVal > 0 ? (d.interest / maxVal) * 100 : 0;

        var row = document.createElement("div");
        row.className = "bar-row";
        row.innerHTML =
          '<div class="bar-label">' + d.year + "y</div>" +
          '<div class="bar-track">' +
            '<div class="bar-principal" style="width:' + pctContrib + '%"></div>' +
            '<div class="bar-interest" style="width:' + pctInterest + '%"></div>' +
          "</div>" +
          '<div class="bar-amount">' + formatUSD(d.balance) + "</div>";
        chart.appendChild(row);
      }
    }

    // Recalculate on any input change
    document.querySelectorAll("input").forEach(function (el) {
      el.addEventListener("input", calculate);
    });

    // Initial calculation
    calculate();
  </script>
</body>
</html>
